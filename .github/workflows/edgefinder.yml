name: EdgeFinder

# Runs 3x a day (captures early lines -> afternoon movement -> near game time),
# and you can also press "Run workflow" anytime for a fresh pull.
on:
  workflow_dispatch:        # the manual "Run workflow" button
  schedule:
    # Times are UTC. These are 10am / 2pm / 6pm Central (CDT).
    - cron: '0 15 * * *'    # ~10am CT - morning, early lines
    - cron: '0 19 * * *'    # ~2pm CT  - afternoon movement
    - cron: '0 23 * * *'    # ~6pm CT  - evening, near close for night games

permissions:
  contents: write

concurrency:
  group: edgefinder-run
  cancel-in-progress: false

jobs:
  run-edgefinder:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install certifi (helps with SSL)
        run: pip install --quiet certifi

      - name: Run EdgeFinder
        env:
          ODDS_KEY: ${{ secrets.ODDS_KEY }}
        run: python edgefinder.py

      - name: Publish dashboard, stats, logs + CSVs
        run: |
          git config user.name  "edgefinder-bot"
          git config user.email "edgefinder-bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add docs/ edgefinder_betlog.json edgefinder_snapshots.json edgefinder_history/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "EdgeFinder run $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
