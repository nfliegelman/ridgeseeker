name: RidgeSeeker

on:
  schedule:
    # 15:00 UTC full: grades last night, morning board, logs plays
    - cron: '0 15 * * *'
    # 21:30 UTC full: pre-slate board with matured sharp money, logs plays
    - cron: '30 21 * * *'
    # 22:45 UTC close-capture: h2h only, refreshes closes before the East slate
    - cron: '45 22 * * *'
    # ---- EXPANDED SCHEDULE: uncomment ONLY after the F26 verification curl passes
    # ---- AND RS_BOOKMAKERS below is set to '1'. Without F26 this schedule costs
    # ---- ~660 credits/month and dies mid-month; with it, ~330.
    # 13:30 UTC observe: opener board, snapshots + closes, NEVER logs plays
    # - cron: '30 13 * * *'
    # 01:45 UTC close-capture: West-coast slate closes
    # - cron: '45 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run RidgeSeeker
        env:
          ODDS_KEY: ${{ secrets.ODDS_KEY }}
          RS_MODE: ${{ (github.event.schedule == '45 22 * * *' || github.event.schedule == '45 1 * * *') && 'close' || (github.event.schedule == '30 13 * * *' && 'observe' || 'full') }}
          # F26 named-bookmaker fetch. '0' = OFF (regions=us,eu, current billing).
          # Set to '1' ONLY after the verification curl confirms MLB coverage and
          # h2h_lay billing (AUDIT_TODO batch 3). Full run drops 6 -> 3 credits.
          RS_BOOKMAKERS: '0'
        run: python ridgeseeker.py
      - name: Commit results
        run: |
          git config user.name "ridgeseeker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "RidgeSeeker run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
