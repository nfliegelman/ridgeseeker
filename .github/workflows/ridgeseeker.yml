name: RidgeSeeker
on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'
    - cron: '30 21 * * *'
permissions:
  contents: write
concurrency:
  group: ridgeseeker
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install certifi
        run: pip install --quiet certifi
      - name: Run RidgeSeeker
        env:
          ODDS_KEY: ${{ secrets.ODDS_KEY }}
        run: python ridgeseeker.py
      - name: Publish dashboard + save logs
        run: |
          git config user.name  "ridgeseeker-bot"
          git config user.email "ridgeseeker-bot@users.noreply.github.com"
          git add docs/ ridgeseeker_betlog.json ridgeseeker_snapshots.json ridgeseeker_history/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "RidgeSeeker run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
